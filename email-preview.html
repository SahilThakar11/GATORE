    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', system-ui, sans-serif; background: #1a1a2e; color: #fff; min-height: 100vh; }

    /* ── Header ── */
    .preview-header {
      background: #134e4a;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid #0d9488;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 4px;
      padding: 16px 24px 0;
      background: #111827;
      border-bottom: 1px solid #1f2937;
    }
    .tab {
      padding: 8px 16px;
      border-radius: 8px 8px 0 0;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      color: #9ca3af;
      background: #1f2937;
      transition: all 150ms;
    }
    .tab:hover { color: #f0fdfa; background: #374151; }
    .tab.active { background: #fffbf7; color: #134e4a; font-weight: 700; }

    /* ── Canvas ── */
    .canvas {
      background: #fffbf7;
      min-height: calc(100vh - 108px);
      display: none;
      padding: 0;
    }
    .canvas.active { display: block; }

    /* ── Email panel ── */
    iframe {
      width: 100%;
      height: calc(100vh - 108px);
      border: none;
      display: block;
    }
  </style>
</head>
